name: HestiaApp
options:
  bundleIdPrefix: com.hestia
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: "4.6.0"
  Grape:
    url: https://github.com/SwiftGraphs/Grape
    from: "1.1.0"

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "6.1"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIUserInterfaceStyle: Dark
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  HestiaApp:
    type: application
    platform: iOS
    sources:
      - path: Shared
        type: group
      - path: iOS
        type: group
        excludes:
          - "*.plist"
    dependencies:
      - package: Lottie
      - package: Grape
      - framework: HealthKit.framework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hestia.app
        INFOPLIST_FILE: iOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: iOS/HestiaApp.entitlements
        DEVELOPMENT_TEAM: ""
        CODE_SIGN_IDENTITY: "Apple Development"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
    info:
      path: iOS/Info.plist
      properties:
        CFBundleDisplayName: Hestia
        UILaunchScreen:
          UIColorName: LaunchScreenBackground
        NSFaceIDUsageDescription: Hestia uses Face ID to secure your conversations and personal data.
        NSCameraUsageDescription: Hestia uses the camera to let you customize your agent avatars.
        NSPhotoLibraryUsageDescription: Hestia uses your photo library to let you customize your agent avatars.
        NSCalendarsUsageDescription: Hestia needs calendar access to show your upcoming events and help manage your schedule.
        NSCalendarsFullAccessUsageDescription: Hestia needs full calendar access to show your upcoming events, create new events, and help manage your schedule.
        NSRemindersUsageDescription: Hestia needs reminders access to help you manage tasks and to-dos.
        NSRemindersFullAccessUsageDescription: Hestia needs full reminders access to show your tasks, create new reminders, and help you stay organized.
        NSHealthShareUsageDescription: Hestia reads your health data to provide personalized health coaching, daily briefings, and activity insights. Your data stays on your devices and server — it is never shared with third parties.
        NSSpeechRecognitionUsageDescription: Hestia uses speech recognition to transcribe your voice journal entries.
        NSMicrophoneUsageDescription: Hestia needs microphone access to record your voice journal entries.
        UIAppFonts:
          - Volkhov-Regular.ttf
          - Volkhov-Bold.ttf
        ITSAppUsesNonExemptEncryption: false

  HestiaAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/HestiaAppTests
        type: group
    dependencies:
      - target: HestiaApp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.hestia.app.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HestiaApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/HestiaApp"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  HestiaApp:
    build:
      targets:
        HestiaApp: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HestiaAppTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
