name: HestiaApp
options:
  bundleIdPrefix: com.andrewlonati
  deploymentTarget:
    iOS: "26.0"
    macOS: "15.0"
  xcodeVersion: "26.0"
  generateEmptyDirectories: true
  groupSortPosition: top

packages:
  Lottie:
    url: https://github.com/airbnb/lottie-ios
    from: "4.6.0"
  Grape:
    url: https://github.com/SwiftGraphs/Grape
    from: "1.1.0"
  HestiaShared:
    path: ../HestiaShared
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

settings:
  base:
    MARKETING_VERSION: "1.10.4"
    CURRENT_PROJECT_VERSION: "41"
    SWIFT_VERSION: "6.1"
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    INFOPLIST_KEY_UILaunchScreen_Generation: YES
    INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
    INFOPLIST_KEY_UIUserInterfaceStyle: Dark
    CODE_SIGN_STYLE: Automatic
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor

targets:
  HestiaApp:
    type: application
    platform: iOS
    sources:
      - path: Shared
        type: group
        excludes:
          # iOS trimming (Sprint 13 WS2) — macOS is the primary full-featured app
          - "Views/CommandCenter/**"
          - "Views/Explorer/**"
          - "Views/Wiki/**"
          - "ViewModels/NewsfeedViewModel.swift"
          - "ViewModels/NeuralNetViewModel.swift"
          - "ViewModels/ExplorerViewModel.swift"
          - "ViewModels/WikiViewModel.swift"
      - path: iOS
        type: group
        excludes:
          - "*.plist"
    dependencies:
      - package: Lottie
      - package: Grape
      - package: HestiaShared
      - framework: HealthKit.framework
        embed: false
      - framework: AuthenticationServices.framework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewlonati.hestia
        INFOPLIST_FILE: iOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: iOS/HestiaApp.entitlements
        DEVELOPMENT_TEAM: 563968AM8L
        CODE_SIGN_IDENTITY: "Apple Development"
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: YES
    info:
      path: iOS/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: Hestia
        UILaunchScreen:
          UIColorName: LaunchScreenBackground
        NSFaceIDUsageDescription: Hestia uses Face ID to secure your conversations and personal data.
        NSCameraUsageDescription: Hestia uses the camera to let you customize your agent avatars.
        NSPhotoLibraryUsageDescription: Hestia uses your photo library to let you customize your agent avatars.
        NSCalendarsUsageDescription: Hestia needs calendar access to show your upcoming events and help manage your schedule.
        NSCalendarsFullAccessUsageDescription: Hestia needs full calendar access to show your upcoming events, create new events, and help manage your schedule.
        NSRemindersUsageDescription: Hestia needs reminders access to help you manage tasks and to-dos.
        NSRemindersFullAccessUsageDescription: Hestia needs full reminders access to show your tasks, create new reminders, and help you stay organized.
        NSHealthShareUsageDescription: Hestia reads your health data to provide personalized health coaching, daily briefings, and activity insights. Your data stays on your devices and server — it is never shared with third parties.
        NSHealthUpdateUsageDescription: Hestia does not write health data. This key is required because the HealthKit framework is linked.
        NSSpeechRecognitionUsageDescription: Hestia uses speech recognition to transcribe your voice journal entries.
        NSMicrophoneUsageDescription: Hestia needs microphone access to record your voice journal entries.
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIAppFonts:
          - Volkhov-Regular.ttf
          - Volkhov-Bold.ttf
        ITSAppUsesNonExemptEncryption: false

  HestiaWorkspace:
    type: application
    platform: macOS
    sources:
      - path: macOS
        type: group
        excludes:
          - "*.plist"
      - path: Shared/Models
        type: group
        includes:
          - "WikiModels.swift"
          - "ToolModels.swift"
          - "DeviceModels.swift"
          - "NewsfeedModels.swift"
          - "InvestigationModels.swift"
          - "DeepLinkModels.swift"
      - path: macOS/Fonts
        type: folder
        buildPhase: resources
      - path: macOS/Resources/WikiResources
        type: folder
        buildPhase: resources
      - path: macOS/Resources/WorkflowCanvas
        type: folder
        buildPhase: resources
    dependencies:
      - package: HestiaShared
      - package: Sparkle
      - framework: EventKit.framework
        embed: false
      - framework: WebKit.framework
        embed: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewlonati.hestia-macos
        PRODUCT_NAME: Hestia
        INFOPLIST_FILE: macOS/Info.plist
        CODE_SIGN_ENTITLEMENTS: macOS/HestiaWorkspace.entitlements
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        COMBINE_HIDPI_IMAGES: YES
        DEVELOPMENT_TEAM: 563968AM8L
        CODE_SIGN_IDENTITY: "Apple Development"
        CODE_SIGN_STYLE: Automatic
    info:
      path: macOS/Info.plist
      properties:
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        CFBundleDisplayName: Hestia
        NSPrincipalClass: NSApplication
        LSMinimumSystemVersion: "15.0"
        ATSApplicationFontsPath: Fonts
        NSCalendarsUsageDescription: Hestia needs calendar access to show your upcoming events in the Command Center.
        SUPublicEDKey: t9z32MFmQGXD5elW9qM+/u/19JBT5c2tmoxfaNzhgwM=
        SUFeedURL: https://aroman117-1618.github.io/hestia/appcast.xml

  HestiaAppTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/HestiaAppTests
        type: group
    dependencies:
      - target: HestiaApp
      - package: HestiaShared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.andrewlonati.hestia.tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/HestiaApp.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/HestiaApp"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  HestiaApp:
    build:
      targets:
        HestiaApp: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - HestiaAppTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  HestiaWorkspace:
    build:
      targets:
        HestiaWorkspace: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
