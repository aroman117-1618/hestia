<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    :root {
        --bg-primary: #110B03;
        --text-primary: #E4DFD7;
        --text-secondary: rgba(235,223,209,0.5);
        --text-faint: rgba(235,223,209,0.3);
        --text-body: rgba(228,223,215,0.88);
        --accent: #E0A050;
        --accent-bright: #FFB900;
        --accent-dark: #FF8904;
        --accent-subtle: rgba(224,160,80,0.08);
        --code-bg: rgba(235,223,209,0.06);
        --border: rgba(254,154,0,0.08);
        --border-strong: rgba(254,154,0,0.15);
        --divider: rgba(182,165,145,0.15);
        --green: #00D492;
        --red: #FF6467;
        --table-header-bg: rgba(224,160,80,0.10);
        --table-row-alt: rgba(235,223,209,0.025);
        --table-row-hover: rgba(235,223,209,0.05);
        --toc-width: 200px;
    }

    * { box-sizing: border-box; }

    html, body {
        margin: 0;
        padding: 0;
        background: var(--bg-primary);
        color: var(--text-primary);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
        font-size: 13.5px;
        line-height: 1.72;
        -webkit-font-smoothing: antialiased;
    }

    /* Layout: content + floating TOC */
    #wrapper {
        display: flex;
        max-width: 1100px;
        margin: 0 auto;
        opacity: 0;
        transition: opacity 180ms ease-in;
    }
    #wrapper.visible { opacity: 1; }

    #content {
        flex: 1;
        min-width: 0;
        padding: 4px 32px 64px 28px;
    }

    /* On This Page TOC */
    #toc {
        width: var(--toc-width);
        flex-shrink: 0;
        padding: 16px 16px 16px 0;
        position: sticky;
        top: 0;
        align-self: flex-start;
        max-height: 100vh;
        overflow-y: auto;
    }
    #toc.hidden { display: none; }

    #toc .toc-label {
        font-size: 11.5px;
        font-weight: 500;
        color: var(--text-faint);
        text-transform: uppercase;
        letter-spacing: 0.8px;
        margin-bottom: 12px;
        padding-left: 12px;
    }

    #toc a {
        display: block;
        padding: 6px 12px;
        font-size: 12.5px;
        line-height: 1.4;
        color: var(--text-secondary);
        text-decoration: none;
        border-left: 2px solid transparent;
        border-radius: 0 4px 4px 0;
        transition: all 120ms ease;
    }
    #toc a:hover {
        color: var(--text-primary);
        background: var(--accent-subtle);
        border-left-color: rgba(224,160,80,0.3);
    }
    #toc a.active {
        color: var(--text-primary);
        border-left-color: var(--accent);
        background: var(--accent-subtle);
    }
    #toc a.depth-3 {
        padding-left: 24px;
        font-size: 12px;
    }

    /* Headings — narrative feel */
    h1 {
        font-size: 22px;
        font-weight: 700;
        color: var(--text-primary);
        margin: 36px 0 16px 0;
        letter-spacing: -0.3px;
        line-height: 1.3;
    }
    h1:first-child { margin-top: 8px; }

    h2 {
        font-size: 17px;
        font-weight: 600;
        color: var(--text-primary);
        margin: 36px 0 12px 0;
        padding-bottom: 8px;
        border-bottom: 1px solid var(--divider);
        line-height: 1.35;
    }

    h3 {
        font-size: 14.5px;
        font-weight: 600;
        color: var(--accent);
        margin: 28px 0 10px 0;
        line-height: 1.4;
    }

    h4 {
        font-size: 13px;
        font-weight: 600;
        color: var(--text-secondary);
        margin: 22px 0 8px 0;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    /* Paragraphs — storytelling spacing */
    p {
        margin: 0 0 16px 0;
        color: var(--text-body);
    }

    strong { color: var(--text-primary); font-weight: 600; }
    em { color: var(--text-secondary); font-style: italic; }

    a {
        color: var(--accent);
        text-decoration: none;
        border-bottom: 1px solid rgba(224,160,80,0.25);
        transition: all 120ms ease;
    }
    a:hover {
        color: var(--accent-bright);
        border-bottom-color: var(--accent-bright);
    }

    /* Lists — narrative flow */
    ul, ol {
        margin: 0 0 16px 0;
        padding-left: 24px;
        color: var(--text-body);
    }
    li {
        margin-bottom: 6px;
        line-height: 1.65;
    }
    li > ul, li > ol { margin-top: 6px; margin-bottom: 6px; }

    /* Horizontal rules */
    hr {
        border: none;
        height: 1px;
        background: var(--divider);
        margin: 32px 0;
    }

    /* Blockquotes — callout style */
    blockquote {
        margin: 4px 0 20px 0;
        padding: 12px 20px;
        border-left: 3px solid var(--accent);
        background: rgba(224,160,80,0.05);
        border-radius: 0 8px 8px 0;
        color: var(--text-body);
    }
    blockquote p { color: var(--text-body); }
    blockquote p:last-child { margin-bottom: 0; }

    /* Inline code */
    code {
        font-family: "SF Mono", "Menlo", "Monaco", monospace;
        font-size: 12px;
        background: var(--code-bg);
        padding: 2px 7px;
        border-radius: 4px;
        color: var(--accent);
    }

    /* Code blocks */
    pre {
        margin: 4px 0 20px 0;
        padding: 16px 18px;
        background: rgba(235,223,209,0.04);
        border: 1px solid var(--border);
        border-radius: 10px;
        overflow-x: auto;
    }
    pre code {
        background: none;
        padding: 0;
        border-radius: 0;
        color: var(--text-primary);
        font-size: 12px;
        line-height: 1.55;
    }

    /* highlight.js tokens */
    .hljs { background: transparent; color: var(--text-primary); }
    .hljs-keyword, .hljs-selector-tag, .hljs-built_in { color: #FF8C69; }
    .hljs-string, .hljs-attr { color: #98D8A0; }
    .hljs-number, .hljs-literal { color: #D4A0FF; }
    .hljs-comment { color: rgba(235,223,209,0.30); font-style: italic; }
    .hljs-function .hljs-title, .hljs-title.function_ { color: var(--accent-bright); }
    .hljs-type, .hljs-title.class_ { color: #7DC8E8; }
    .hljs-variable, .hljs-template-variable { color: #E0A050; }
    .hljs-meta { color: rgba(235,223,209,0.5); }
    .hljs-punctuation { color: rgba(235,223,209,0.6); }
    .hljs-symbol { color: #D4A0FF; }

    /* Tables — refined */
    table {
        width: 100%;
        border-collapse: collapse;
        margin: 4px 0 20px 0;
        font-size: 12.5px;
        border-radius: 8px;
        overflow: hidden;
    }
    thead {
        background: var(--table-header-bg);
    }
    th {
        text-align: left;
        padding: 10px 14px;
        font-weight: 600;
        color: var(--accent);
        font-size: 11.5px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        border-bottom: 1px solid var(--border-strong);
    }
    td {
        padding: 9px 14px;
        border-bottom: 1px solid var(--border);
        color: var(--text-body);
    }
    tr:nth-child(even) { background: var(--table-row-alt); }
    tr:hover { background: var(--table-row-hover); }

    /* Mermaid diagrams */
    .mermaid-container {
        margin: 20px 0;
        padding: 24px;
        background: rgba(235,223,209,0.03);
        border: 1px solid var(--border);
        border-radius: 10px;
        text-align: center;
        overflow-x: auto;
    }
    .mermaid-container svg {
        max-width: 100%;
        height: auto;
    }
    .mermaid-error {
        color: var(--red);
        font-size: 12px;
        padding: 12px;
    }

    /* Custom scrollbar */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
        background: rgba(235,223,209,0.12);
        border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(235,223,209,0.22); }

    /* Selection */
    ::selection {
        background: rgba(224,160,80,0.3);
        color: var(--text-primary);
    }

    /* Responsive: hide TOC when narrow */
    @media (max-width: 640px) {
        #toc { display: none; }
        #content { padding: 4px 16px 48px 16px; }
    }
</style>
<script src="markdown-it.min.js"></script>
<script src="highlight.min.js"></script>
<script src="mermaid.min.js"></script>
</head>
<body>
<!--
    Wiki content renderer for Hestia macOS app.
    Content is injected from Swift via renderMarkdown() JS bridge.
    All content originates from the Hestia backend (wiki articles) — not user input.
    markdown-it is configured with html:false to prevent HTML injection.
-->
<div id="wrapper">
    <div id="content"></div>
    <div id="toc" class="hidden">
        <div class="toc-label">On this page</div>
        <div id="toc-links"></div>
    </div>
</div>
<script>
// Initialize markdown-it with highlight.js integration
// NOTE: html:false prevents any raw HTML in markdown source from rendering
var md = window.markdownit({
    html: false,
    linkify: true,
    typographer: true,
    highlight: function(str, lang) {
        if (lang === 'mermaid') {
            return '<div class="mermaid-placeholder" data-content="' +
                encodeURIComponent(str) + '"></div>';
        }
        if (lang && hljs.getLanguage(lang)) {
            try {
                return '<pre class="hljs"><code>' +
                    hljs.highlight(str, { language: lang, ignoreIllegals: true }).value +
                    '</code></pre>';
            } catch (_) {}
        }
        return '<pre class="hljs"><code>' + md.utils.escapeHtml(str) + '</code></pre>';
    }
});

mermaid.initialize({
    startOnLoad: false,
    theme: 'dark',
    themeVariables: {
        primaryColor: '#2F1C03',
        primaryTextColor: '#E4DFD7',
        primaryBorderColor: '#E0A050',
        lineColor: '#E0A050',
        secondaryColor: '#110B03',
        tertiaryColor: '#261302',
        fontSize: '13px',
        fontFamily: '-apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif',
        noteBkgColor: '#261302',
        noteTextColor: '#E4DFD7',
        noteBorderColor: '#E0A050'
    }
});

var renderCounter = 0;

// Build "On this page" TOC from H2/H3 headings in the content
function buildTOC() {
    var contentEl = document.getElementById('content');
    var tocLinks = document.getElementById('toc-links');
    var tocEl = document.getElementById('toc');
    var headings = contentEl.querySelectorAll('h2, h3');

    tocLinks.textContent = '';

    if (headings.length < 2) {
        tocEl.classList.add('hidden');
        return;
    }

    tocEl.classList.remove('hidden');

    headings.forEach(function(heading, i) {
        var id = 'section-' + i;
        heading.id = id;

        var a = document.createElement('a');
        a.href = '#' + id;
        a.textContent = heading.textContent;
        if (heading.tagName === 'H3') {
            a.classList.add('depth-3');
        }
        a.addEventListener('click', function(e) {
            e.preventDefault();
            heading.scrollIntoView({ behavior: 'smooth', block: 'start' });
        });
        tocLinks.appendChild(a);
    });

    // Intersection observer for active state
    if (window._tocObserver) window._tocObserver.disconnect();
    window._tocObserver = new IntersectionObserver(function(entries) {
        entries.forEach(function(entry) {
            if (entry.isIntersecting) {
                var links = tocLinks.querySelectorAll('a');
                links.forEach(function(l) { l.classList.remove('active'); });
                var activeLink = tocLinks.querySelector('a[href="#' + entry.target.id + '"]');
                if (activeLink) activeLink.classList.add('active');
            }
        });
    }, { rootMargin: '-10% 0px -80% 0px', threshold: 0 });

    headings.forEach(function(h) { window._tocObserver.observe(h); });
}

// Called from Swift to render article content
async function renderMarkdown(rawContent, isDiagram) {
    var thisRender = ++renderCounter;
    var wrapper = document.getElementById('wrapper');
    var el = document.getElementById('content');
    wrapper.classList.remove('visible');

    if (isDiagram) {
        try {
            var result = await mermaid.render('mermaid-' + thisRender, rawContent);
            if (thisRender !== renderCounter) return;
            el.textContent = '';
            var container = document.createElement('div');
            container.className = 'mermaid-container';
            container.insertAdjacentHTML('afterbegin', result.svg);
            el.appendChild(container);
        } catch(e) {
            if (thisRender !== renderCounter) return;
            el.textContent = '';
            var errContainer = document.createElement('div');
            errContainer.className = 'mermaid-container';
            var errDiv = document.createElement('div');
            errDiv.className = 'mermaid-error';
            errDiv.textContent = 'Diagram render error: ' + e.message;
            var pre = document.createElement('pre');
            var code = document.createElement('code');
            code.textContent = rawContent;
            pre.appendChild(code);
            errContainer.appendChild(errDiv);
            errContainer.appendChild(pre);
            el.appendChild(errContainer);
        }
        document.getElementById('toc').classList.add('hidden');
    } else {
        // Standard markdown
        var html = md.render(rawContent);
        if (thisRender !== renderCounter) return;
        el.textContent = '';
        el.insertAdjacentHTML('afterbegin', html);

        // Post-process: render mermaid placeholders
        var placeholders = el.querySelectorAll('.mermaid-placeholder');
        for (var i = 0; i < placeholders.length; i++) {
            if (thisRender !== renderCounter) return;
            var placeholder = placeholders[i];
            var mermaidSrc = decodeURIComponent(placeholder.getAttribute('data-content'));
            var mContainer = document.createElement('div');
            mContainer.className = 'mermaid-container';
            try {
                var rendered = await mermaid.render('mermaid-inline-' + thisRender + '-' + i, mermaidSrc);
                mContainer.insertAdjacentHTML('afterbegin', rendered.svg);
            } catch(e2) {
                var mErr = document.createElement('div');
                mErr.className = 'mermaid-error';
                mErr.textContent = 'Diagram error: ' + e2.message;
                mContainer.appendChild(mErr);
            }
            placeholder.parentNode.replaceChild(mContainer, placeholder);
        }

        // Build TOC from rendered headings
        buildTOC();
    }

    // Fade in
    if (thisRender === renderCounter) {
        requestAnimationFrame(function() {
            wrapper.classList.add('visible');
        });
    }
}

// Signal to Swift that the template has loaded
try {
    window.webkit.messageHandlers.templateReady.postMessage('ready');
} catch(e) {}
</script>
</body>
</html>
