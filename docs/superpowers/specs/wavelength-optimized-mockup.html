<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Hestia — Optimized Wavelength + Header</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  /* iPhone frame */
  .phone-frame {
    width: 390px;
    height: 844px;
    background: #020101;
    border-radius: 44px;
    position: relative;
    overflow: hidden;
    box-shadow: 0 0 0 3px #333, 0 0 40px rgba(0,0,0,0.8);
  }

  /* Dynamic Island */
  .dynamic-island {
    position: absolute;
    top: 10px;
    left: 50%;
    transform: translateX(-50%);
    width: 126px;
    height: 36px;
    background: #000;
    border-radius: 20px;
    z-index: 50;
  }

  /* Full-screen canvas for wavelength */
  #wavelength {
    position: absolute;
    top: 0; left: 0;
    width: 390px;
    height: 844px;
  }

  /* Header overlay */
  .header {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 45%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding-top: 60px;
    z-index: 10;
    pointer-events: none;
  }

  .header-content {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Constellation stars */
  .constellation {
    position: absolute;
    top: -20px; left: -60px; right: -60px; bottom: -30px;
    pointer-events: none;
  }
  .star {
    position: absolute;
    border-radius: 50%;
    background: #FFD700;
    animation: twinkle 2.5s ease-in-out infinite alternate;
  }
  .star.sm { width: 2px; height: 2px; box-shadow: 0 0 3px rgba(255,215,0,0.5); }
  .star.md { width: 3px; height: 3px; box-shadow: 0 0 5px rgba(255,215,0,0.6); }
  .star.lg { width: 4px; height: 4px; box-shadow: 0 0 6px rgba(255,159,10,0.7); }

  .star:nth-child(1) { top: 0%; left: 5%; animation-delay: 0s; }
  .star:nth-child(2) { top: 15%; left: 90%; animation-delay: 0.8s; }
  .star:nth-child(3) { top: 85%; left: 15%; animation-delay: 1.5s; }
  .star:nth-child(4) { top: 10%; left: 55%; animation-delay: 0.3s; }
  .star:nth-child(5) { top: 75%; left: 80%; animation-delay: 2.0s; }
  .star:nth-child(6) { top: 45%; left: 0%; animation-delay: 1.2s; }
  .star:nth-child(7) { top: 60%; left: 95%; animation-delay: 0.6s; }

  /* Title — Option A gradient font */
  .title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 1.5px;
    background: linear-gradient(135deg, #FFD700, #FF9F0A, #E08A00);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    position: relative;
    z-index: 2;
  }

  /* Animated underline — Option D */
  .underline {
    height: 1.5px;
    margin-top: 6px;
    background: linear-gradient(90deg, transparent, #FF9F0A 30%, #FFD700 70%, transparent);
    animation: shimmer-underline 3s ease-in-out infinite;
    border-radius: 1px;
  }

  /* Bottom content — no hard edges, all overlaid on the canvas */
  .content-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    pointer-events: none;
    padding-bottom: 8px;
  }

  .messages {
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 0 16px 8px;
    gap: 8px;
  }

  .bubble {
    max-width: 75%;
    padding: 10px 14px;
    border-radius: 18px;
    font-size: 16px;
    line-height: 1.4;
  }
  .bubble.user {
    align-self: flex-end;
    background: rgba(255,255,255,0.1);
    color: white;
  }
  .bubble.assistant {
    align-self: flex-start;
    background: rgba(255,159,10,0.12);
    color: #f0e0c8;
    border: 1px solid rgba(255,159,10,0.15);
  }

  /* Input bar */
  .input-bar {
    margin: 0 24px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(20px);
    border-radius: 28px;
    border: 0.5px solid rgba(255,255,255,0.12);
    pointer-events: auto;
  }
  .input-bar input {
    flex: 1;
    background: none;
    border: none;
    color: white;
    font-size: 16px;
    outline: none;
    padding: 4px 0;
  }
  .input-bar input::placeholder { color: rgba(255,255,255,0.3); }
  .mic-icon {
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    color: rgba(255,255,255,0.5);
    font-size: 18px;
  }

  /* Mode toggle — outside the phone frame */
  .mode-toggle {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 100;
    display: flex;
    gap: 8px;
    pointer-events: auto;
  }
  .mode-btn {
    padding: 8px 16px;
    border-radius: 20px;
    border: 1px solid rgba(255,159,10,0.3);
    background: rgba(255,159,10,0.1);
    color: #FF9F0A;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.2s;
  }
  .mode-btn:hover { background: rgba(255,159,10,0.25); }
  .mode-btn.active { background: rgba(255,159,10,0.35); border-color: #FF9F0A; }

  /* Stats overlay */
  .stats {
    position: absolute;
    top: 50px; left: 12px;
    z-index: 60;
    font-size: 10px;
    color: rgba(255,255,255,0.2);
    font-family: 'SF Mono', monospace;
    line-height: 1.6;
  }

  @keyframes twinkle {
    0% { opacity: 0.2; transform: scale(0.7); }
    100% { opacity: 1; transform: scale(1.3); }
  }
  @keyframes shimmer-underline {
    0%, 100% { opacity: 0.5; width: 60px; }
    50% { opacity: 1; width: 100px; }
  }
</style>
</head>
<body>

<div class="phone-frame">
  <div class="dynamic-island"></div>
  <canvas id="wavelength" width="780" height="1688"></canvas>

  <div class="header">
    <div class="header-content">
      <div class="constellation">
        <div class="star sm"></div>
        <div class="star md"></div>
        <div class="star sm"></div>
        <div class="star md"></div>
        <div class="star lg"></div>
        <div class="star sm"></div>
        <div class="star md"></div>
      </div>
      <span class="title">Hestia</span>
      <div class="underline"></div>
    </div>
  </div>

  <div class="content-overlay">
    <div class="messages">
      <div class="bubble user">hey tia</div>
      <div class="bubble assistant">Good evening, Boss. What can I do for you?</div>
    </div>
    <div class="input-bar">
      <input type="text" placeholder="Message Tia...">
      <div class="mic-icon">&#9641;&#9641;&#9641;</div>
    </div>
  </div>

  <div class="stats" id="stats"></div>
</div>

<div class="mode-toggle">
  <button class="mode-btn active" onclick="setMode('idle')">Idle</button>
  <button class="mode-btn" onclick="setMode('listening')">Listen</button>
  <button class="mode-btn" onclick="setMode('speaking')">Speak</button>
</div>

<script>
// ============================================================
// OPTIMIZED Wavelength Renderer — iPhone-sized (390x844 @ 2x)
// ============================================================

const canvas = document.getElementById('wavelength');
const ctx = canvas.getContext('2d', { alpha: false });

// Fixed iPhone dimensions
const W = 390;
const H = 844;
const DPR = 2;

canvas.width = W * DPR;
canvas.height = H * DPR;
canvas.style.width = W + 'px';
canvas.style.height = H + 'px';
ctx.scale(DPR, DPR);

const PARTICLE_COUNT = 2000;
const WAVE_TABLE_SIZE = 128;

const COLORS = [
  [255, 240, 208],
  [255, 179,  71],
  [255, 159,  10],
  [224, 138,   0],
  [192, 104,   0],
  [139,  69,   0],
  [255, 215,   0],
];

const MODES = {
  idle:      { speedMult: 1.0, ampMult: 1.0, densityMult: 1.0, glowMult: 0.7, audioVol: 0 },
  listening: { speedMult: 1.2, ampMult: 1.1, densityMult: 1.2, glowMult: 0.85, audioVol: 0.2 },
  speaking:  { speedMult: 1.4, ampMult: 1.3, densityMult: 1.5, glowMult: 1.0, audioVol: 0.7 },
};

let currentMode = 'idle';
let params = { ...MODES.idle };
let targetParams = { ...MODES.idle };

const waveTableCalm = new Float32Array(WAVE_TABLE_SIZE * 3);
const waveTableSpeak = new Float32Array(WAVE_TABLE_SIZE * 3);

const particles = [];

function createParticle() {
  const isHero = Math.random() < 0.04;
  return {
    x: Math.random() * W,
    baseSize: isHero ? (5 + Math.random() * 4) : (2 + Math.random() * 3.5),
    z: 0.4 + Math.random() * 0.6,
    speedX: 0.15 + Math.random() * 0.45,
    yOffset: Math.random() < 0.2
      ? (Math.random() - 0.5) * 180
      : (Math.random() - 0.5) * 40,
    phaseOffset: Math.random() * Math.PI * 2,
    colorIdx: Math.floor(Math.random() * COLORS.length),
    ribbon: Math.floor(Math.random() * 3),
    isHero,
    isScattered: Math.random() < 0.2,
  };
}

for (let i = 0; i < PARTICLE_COUNT; i++) {
  particles.push(createParticle());
}

function computeWaveTables(time, speakingTime) {
  for (let bucket = 0; bucket < WAVE_TABLE_SIZE; bucket++) {
    const nx = bucket / WAVE_TABLE_SIZE;

    waveTableCalm[bucket * 3 + 0] =
      Math.sin(nx * Math.PI * 3 + time * 2) * 45 +
      Math.sin(nx * Math.PI * 2 - time) * 20;
    waveTableCalm[bucket * 3 + 1] =
      Math.sin(nx * Math.PI * 4 + time * 1.5) * 35;
    waveTableCalm[bucket * 3 + 2] =
      Math.sin(nx * Math.PI * 2.5 + time * 2.5) * 40;

    const t = speakingTime;
    const a0 = nx * Math.PI * 2.5 - t * 1.2;
    const b0 = nx * Math.PI * 1.5 + t * 0.8;
    waveTableSpeak[bucket * 3 + 0] = (Math.sin(a0) + Math.sin(b0) * 0.5) / 1.5;

    const a1 = nx * Math.PI * 4.0 - t * 1.8;
    const b1 = nx * Math.PI * 2.0 - t * 1.5;
    waveTableSpeak[bucket * 3 + 1] = (Math.sin(a1) + Math.cos(b1) * 0.6) / 1.6;

    const a2 = nx * Math.PI * 3.0 + t * 2.4;
    const b2 = nx * Math.PI * 4.5 - t * 2.0;
    waveTableSpeak[bucket * 3 + 2] = (Math.sin(a2) + Math.sin(b2) * 0.4) / 1.4;
  }
}

let globalTime = 0;
let speakingTime = 0;
let lastFrame = performance.now();
let frameCount = 0;
let fps = 0;
let fpsTimer = 0;

function lerp(a, b, t) { return a + (b - a) * t; }

function frame(now) {
  const dt = Math.min(0.033, (now - lastFrame) / 1000);
  lastFrame = now;

  frameCount++;
  fpsTimer += dt;
  if (fpsTimer >= 1) {
    fps = frameCount;
    frameCount = 0;
    fpsTimer = 0;
  }

  for (const key of Object.keys(targetParams)) {
    params[key] = lerp(params[key], targetParams[key], 0.05);
  }

  globalTime += 0.005 * params.speedMult;
  speakingTime += dt * (1 + params.audioVol * 4);

  computeWaveTables(globalTime, speakingTime);

  // Clear — full canvas, no seams
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillStyle = '#020101';
  ctx.fillRect(0, 0, W, H);

  ctx.globalCompositeOperation = 'lighter';

  const centerY = H / 2;
  const active = params.audioVol;
  const glow = params.glowMult;
  const visibleCount = Math.min(Math.floor(PARTICLE_COUNT * 0.66 * params.densityMult), particles.length);

  const baseAmps = [35, 40, 45];
  const asymmetries = [1.3, 1.7, 2.2];
  const troughDamps = [0.5, 0.3, 0.15];

  for (let i = 0; i < visibleCount; i++) {
    const p = particles[i];

    p.x += p.speedX * params.speedMult;
    if (p.x > W) {
      p.x = 0;
      p.yOffset = p.isScattered
        ? (Math.random() - 0.5) * 180
        : (Math.random() - 0.5) * 40;
    }

    const nx = p.x / W;
    const d = Math.abs(nx - 0.5) * 2.2;
    const taper = Math.max(0, 1 - d * d);
    const alpha = taper * p.z;
    if (alpha <= 0.05) continue;

    const bucket = Math.min(WAVE_TABLE_SIZE - 1, Math.floor(nx * WAVE_TABLE_SIZE));
    const ribbon = p.ribbon;

    let calmY = waveTableCalm[bucket * 3 + ribbon];
    calmY += Math.sin(p.phaseOffset + globalTime) * 8;
    calmY *= params.ampMult;

    const rawWave = waveTableSpeak[bucket * 3 + ribbon];
    let speakingY = 0;
    if (rawWave > 0) {
      speakingY = -Math.pow(rawWave, 1.5) * baseAmps[ribbon] * params.ampMult * asymmetries[ribbon];
    } else {
      speakingY = Math.abs(rawWave) * baseAmps[ribbon] * params.ampMult * troughDamps[ribbon];
    }

    const speakThick = rawWave > 0 ? (1 + rawWave * rawWave * 1.5) : (1 - Math.abs(rawWave) * 0.6);

    let waveY = calmY * (1 - active) + speakingY * active;
    const thickness = 1 * (1 - active) + speakThick * active;
    const swirl = Math.sin(p.phaseOffset + speakingTime * 2.5) * (15 * active);
    const yOff = (p.yOffset + swirl) * thickness;

    waveY *= taper;
    const y = centerY + waveY + yOff * p.z * taper;

    const size = p.baseSize * p.z;
    const drawSize = size * 6;
    const c = COLORS[p.colorIdx];
    const finalAlpha = alpha * glow;

    ctx.globalAlpha = finalAlpha;

    const grad = ctx.createRadialGradient(p.x, y, 0, p.x, y, drawSize / 2);
    const r = c[0], g = c[1], b = c[2];

    if (p.isHero) {
      grad.addColorStop(0, `rgba(${r},${g},${b},1)`);
      grad.addColorStop(0.15, `rgba(${r},${g},${b},0.8)`);
      grad.addColorStop(0.35, `rgba(${r},${g},${b},0.2)`);
      grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    } else {
      grad.addColorStop(0, `rgba(${r},${g},${b},1)`);
      grad.addColorStop(0.08, `rgba(${r},${g},${b},0.8)`);
      grad.addColorStop(0.22, `rgba(${r},${g},${b},0.2)`);
      grad.addColorStop(1, `rgba(${r},${g},${b},0)`);
    }

    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(p.x, y, drawSize / 2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalAlpha = 1;
  ctx.globalCompositeOperation = 'source-over';

  document.getElementById('stats').textContent =
    `${fps} fps | ${visibleCount}p | ${currentMode}`;

  requestAnimationFrame(frame);
}

function setMode(mode) {
  currentMode = mode;
  targetParams = { ...MODES[mode] };
  document.querySelectorAll('.mode-btn').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase().startsWith(mode.substring(0, 4)));
  });
}

requestAnimationFrame(frame);
</script>

</body>
</html>
