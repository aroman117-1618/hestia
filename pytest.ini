[pytest]
# Pytest configuration for Hestia

# Register custom markers
markers =
    integration: mark test as integration test (requires Ollama running)

# Default asyncio mode
asyncio_mode = auto

# Timeout settings (in seconds)
# Integration tests need longer timeouts for Mixtral 8x7B on Mac Mini M1
timeout = 600

# Async timeout for individual tests
asyncio_default_fixture_loop_scope = function
