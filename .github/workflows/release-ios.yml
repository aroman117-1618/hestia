name: iOS Release (TestFlight)

on:
  push:
    tags:
      - 'ios-v*'   # iOS-only release
      - 'v*'       # Joint release (both platforms)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.5.4)'
        required: true

concurrency:
  group: release-ios
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  build-and-upload:
    runs-on: [self-hosted, macos, hestia]
    timeout-minutes: 60
    env:
      INPUT_VERSION: ${{ inputs.version }}
      TAG_REF: ${{ github.ref }}

    steps:
      - uses: actions/checkout@v5

      - name: Extract version
        id: version
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG_REF" == refs/tags/v* ]]; then
            echo "version=${TAG_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.0")
            echo "version=${LATEST#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up environment for self-hosted runner
        run: |
          echo "/opt/homebrew/bin" >> $GITHUB_PATH
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Unlock Keychain for code signing
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" ~/Library/Keychains/login.keychain-db
          security set-keychain-settings -t 3600 ~/Library/Keychains/login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" ~/Library/Keychains/login.keychain-db

      - name: Write App Store Connect API key
        env:
          ASC_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_KEY_BASE64 }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$ASC_KEY_BASE64" | base64 --decode > ~/.appstoreconnect/private_keys/AuthKey_${ASC_KEY_ID}.p8
          echo "Wrote API key for key ID: $ASC_KEY_ID"

      - name: Install xcodegen (if missing)
        run: which xcodegen || brew install xcodegen

      - name: Generate Xcode project
        run: cd HestiaApp && xcodegen generate

      - name: Resolve SPM dependencies
        run: |
          cd HestiaApp
          xcodebuild -resolvePackageDependencies \
            -scheme HestiaApp \
            -clonedSourcePackagesDirPath ../spm-cache

      - name: Clean build cache
        run: |
          cd HestiaApp
          xcodebuild clean \
            -scheme HestiaApp \
            -configuration Release \
            -clonedSourcePackagesDirPath ../spm-cache || true
          rm -rf build/

      - name: Build and archive
        run: |
          cd HestiaApp
          xcodebuild archive \
            -scheme HestiaApp \
            -archivePath build/HestiaApp.xcarchive \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            -clonedSourcePackagesDirPath ../spm-cache \
            -derivedDataPath build/DerivedData \
            -allowProvisioningUpdates \
            DEVELOPMENT_TEAM=563968AM8L \
            CODE_SIGN_STYLE=Automatic

      - name: Export archive for App Store
        run: |
          xcodebuild -exportArchive \
            -archivePath HestiaApp/build/HestiaApp.xcarchive \
            -exportPath HestiaApp/build/export-ios \
            -exportOptionsPlist HestiaApp/ExportOptions-iOS.plist \
            -allowProvisioningUpdates

      - name: Upload to App Store Connect (TestFlight)
        env:
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          IPA_PATH=$(find HestiaApp/build/export-ios -name "*.ipa" -maxdepth 1 | head -1)
          if [ -z "$IPA_PATH" ]; then
            echo "ERROR: No .ipa found in export directory"
            ls -la HestiaApp/build/export-ios/
            exit 1
          fi
          echo "Uploading: $IPA_PATH"
          UPLOAD_OUTPUT=$(xcrun altool --upload-app \
            --file "$IPA_PATH" \
            --type ios \
            --apiKey "$ASC_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" 2>&1) || true
          echo "$UPLOAD_OUTPUT"
          if echo "$UPLOAD_OUTPUT" | grep -q "UPLOAD FAILED"; then
            echo "::error::TestFlight upload failed — see validation errors above"
            exit 1
          fi

      - name: Clean up API key
        if: always()
        run: rm -rf ~/.appstoreconnect/private_keys

      - name: Report
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          echo "Hestia iOS v${VERSION} uploaded to App Store Connect"
          echo "TestFlight build should appear within 15-30 minutes after processing"
