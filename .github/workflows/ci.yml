name: Hestia CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ --tb=short -q --timeout=30
        # Per-test timeout of 30s. CI doesn't have Ollama or macOS Keychain,
        # so tests depending on those will fail — that's expected.
        # Full integration testing happens on Mac Mini during deploy.
        continue-on-error: true

      - name: Verify test collection
        run: python -m pytest tests/ --collect-only -q 2>&1 | tail -5
        # Sanity check: make sure tests can at least be collected (imports work)
