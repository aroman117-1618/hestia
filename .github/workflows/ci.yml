name: Hestia CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:  # Allow deploy.yml to call this as a reusable workflow

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Check lockfile freshness
        run: |
          pip install pip-tools -q
          pip-compile requirements.in --output-file=/tmp/requirements-check.txt --no-emit-index-url --quiet 2>/dev/null
          if ! diff -q requirements.txt /tmp/requirements-check.txt > /dev/null 2>&1; then
            echo "::warning::requirements.txt is stale. Run: pip-compile requirements.in --output-file=requirements.txt --no-emit-index-url"
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ --tb=short -q --timeout=30
        # Per-test timeout of 30s. CI doesn't have Ollama or macOS Keychain,
        # so tests depending on those will fail — that's expected.
        # Full integration testing happens on Mac Mini during deploy.
        continue-on-error: true

      - name: Verify test collection
        run: python -m pytest tests/ --collect-only -q 2>&1 | tail -5
        # Sanity check: make sure tests can at least be collected (imports work)

      - name: Security audit (pip-audit)
        run: |
          pip install pip-audit -q
          pip-audit --strict --desc 2>&1 || true
        # Reports known vulnerabilities in dependencies.
        # Visible in CI logs for review.
