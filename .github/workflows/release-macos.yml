name: macOS Release

on:
  push:
    tags:
      - 'v*'
  schedule:
    - cron: '0 13 20 3 *'  # 9 AM ET March 20 — one-time retry for v1.0.1
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.0.1)'
        required: true

concurrency:
  group: release-macos
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: [self-hosted, macos, hestia]
    timeout-minutes: 60
    env:
      INPUT_VERSION: ${{ inputs.version }}
      TAG_REF: ${{ github.ref }}

    steps:
      - uses: actions/checkout@v4

      - name: Extract version
        id: version
        run: |
          if [ -n "$INPUT_VERSION" ]; then
            echo "version=$INPUT_VERSION" >> "$GITHUB_OUTPUT"
          elif [[ "$TAG_REF" == refs/tags/v* ]]; then
            echo "version=${TAG_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            # Scheduled run — find latest version tag
            LATEST=$(git describe --tags --abbrev=0 2>/dev/null || echo "v1.0.1")
            echo "version=${LATEST#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up environment for self-hosted runner
        run: |
          echo "/opt/homebrew/bin" >> $GITHUB_PATH
          echo "/usr/local/bin" >> $GITHUB_PATH

      - name: Unlock Keychain for code signing
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" ~/Library/Keychains/login.keychain-db
          security set-keychain-settings -t 3600 ~/Library/Keychains/login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" ~/Library/Keychains/login.keychain-db

      - name: Install xcodegen (if missing)
        run: which xcodegen || brew install xcodegen

      - name: Generate Xcode project
        run: cd HestiaApp && xcodegen generate

      - name: Resolve SPM dependencies
        run: |
          cd HestiaApp
          xcodebuild -resolvePackageDependencies \
            -scheme HestiaWorkspace \
            -clonedSourcePackagesDirPath ../spm-cache

      - name: Build and archive
        run: |
          cd HestiaApp
          xcodebuild archive \
            -scheme HestiaWorkspace \
            -archivePath build/Hestia.xcarchive \
            -configuration Release \
            -clonedSourcePackagesDirPath ../spm-cache \
            CODE_SIGN_IDENTITY="Developer ID Application" \
            DEVELOPMENT_TEAM=563968AM8L \
            CODE_SIGN_STYLE=Manual \
            ENABLE_HARDENED_RUNTIME=YES

      - name: Export archive
        run: |
          xcodebuild -exportArchive \
            -archivePath HestiaApp/build/Hestia.xcarchive \
            -exportPath HestiaApp/build/export \
            -exportOptionsPlist HestiaApp/ExportOptions.plist

      - name: Find exported app
        id: app
        run: |
          APP_PATH=$(find HestiaApp/build/export -name "*.app" -maxdepth 1 | head -1)
          APP_NAME=$(basename "$APP_PATH")
          echo "path=$APP_PATH" >> "$GITHUB_OUTPUT"
          echo "name=$APP_NAME" >> "$GITHUB_OUTPUT"
          echo "Found app: $APP_NAME at $APP_PATH"

      - name: Notarize
        env:
          AC_USERNAME: ${{ secrets.AC_USERNAME }}
          AC_PASSWORD: ${{ secrets.AC_PASSWORD }}
          AC_TEAM_ID: ${{ secrets.AC_TEAM_ID }}
          APP_PATH: ${{ steps.app.outputs.path }}
        run: |
          ditto -c -k --keepParent "$APP_PATH" /tmp/Hestia-notarize.zip
          xcrun notarytool submit /tmp/Hestia-notarize.zip \
            --apple-id "$AC_USERNAME" \
            --password "$AC_PASSWORD" \
            --team-id "$AC_TEAM_ID" \
            --wait --timeout 1800
          xcrun stapler staple "$APP_PATH"
          rm /tmp/Hestia-notarize.zip

      - name: Package release ZIP
        id: package
        env:
          APP_PATH: ${{ steps.app.outputs.path }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          ditto -c -k --keepParent "$APP_PATH" "Hestia-${VERSION}.zip"
          SIZE=$(stat -f%z "Hestia-${VERSION}.zip")
          echo "size=$SIZE" >> "$GITHUB_OUTPUT"

      - name: Download Sparkle tools
        run: |
          curl -sLO https://github.com/sparkle-project/Sparkle/releases/download/2.6.0/Sparkle-2.6.0.tar.xz
          tar xf Sparkle-2.6.0.tar.xz

      - name: Sign with EdDSA
        id: sparkle
        env:
          SPARKLE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          SIGN_OUTPUT=$(echo "$SPARKLE_KEY" | ./bin/sign_update --ed-key-file - "Hestia-${VERSION}.zip" 2>&1) || true
          ED_SIG=$(echo "$SIGN_OUTPUT" | grep -o 'edSignature="[^"]*"' | cut -d'"' -f2 || echo "")
          echo "signature=$ED_SIG" >> "$GITHUB_OUTPUT"
          if [ -n "$ED_SIG" ]; then
            echo "EdDSA signature generated successfully"
          else
            echo "WARNING: EdDSA signing failed. Output: $SIGN_OUTPUT"
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          gh release delete "v${VERSION}" --yes 2>/dev/null || true
          gh release create "v${VERSION}" \
            "Hestia-${VERSION}.zip" \
            --title "Hestia v${VERSION}" \
            --generate-notes

      - name: Generate appcast.xml
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          REPO="${{ github.repository }}"
          DOWNLOAD_URL="https://github.com/${REPO}/releases/download/v${VERSION}/Hestia-${VERSION}.zip"
          ED_SIG="${{ steps.sparkle.outputs.signature }}"
          SIZE="${{ steps.package.outputs.size }}"
          PUB_DATE="$(date -R)"

          cat > /tmp/appcast.xml << EOF
          <?xml version="1.0" encoding="utf-8"?>
          <rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">
            <channel>
              <title>Hestia Updates</title>
              <item>
                <title>Version ${VERSION}</title>
                <sparkle:version>${VERSION}</sparkle:version>
                <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>
                <pubDate>${PUB_DATE}</pubDate>
                <enclosure
                  url="${DOWNLOAD_URL}"
                  sparkle:edSignature="${ED_SIG}"
                  length="${SIZE}"
                  type="application/octet-stream" />
              </item>
            </channel>
          </rss>
          EOF

      - name: Deploy appcast to gh-pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages 2>/dev/null || true
          if git rev-parse --verify origin/gh-pages >/dev/null 2>&1; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
            git rm -rf . 2>/dev/null || true
          fi
          cp /tmp/appcast.xml appcast.xml
          echo "# Hestia Releases" > README.md
          git add appcast.xml README.md
          git commit -m "Update appcast for v${{ steps.version.outputs.version }}" || true
          git push origin gh-pages
