# Diagram types to generate
diagrams:
  - type: "architecture"
    title: "System Architecture"
    subtitle: "How the layers connect"
  - type: "request-lifecycle"
    title: "Request Lifecycle"
    subtitle: "A chat message's journey"
  - type: "data-flow"
    title: "Data Flow"
    subtitle: "Where data lives and moves"
