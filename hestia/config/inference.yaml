# Hestia Inference Configuration
# See ADR-011 for context window management details

# =============================================================================
# HESTIA INFERENCE ARCHITECTURE
# =============================================================================
# Local models via Ollama:
#   1. Fast local model (Qwen 3.5 9B) for routine queries
#   2. Code specialist (Qwen 2.5 Coder 7B) for programming tasks
#   3. Large local model (Mixtral 8x7B) for complex reasoning (when 64GB available)
# Cloud LLM providers (Anthropic, OpenAI, Google):
#   4. Cloud inference when enabled (disabled/enabled_full/enabled_smart)
# =============================================================================

# Ollama connection settings
ollama_host: "http://localhost:11434"

# -----------------------------------------------------------------------------
# Model Tier Configuration
# -----------------------------------------------------------------------------

# PRIMARY: Fast local model for routine queries (fits in 16GB RAM)
# - Quick responses (2-5s)
# - Good for: simple questions, summaries, basic tasks
primary_model:
  name: "qwen3.5:9b"
  context_limit: 32768
  max_tokens: 2048
  temperature: 0.0
  # Timeout harmonized with iOS client (iOS: 120s request, 150-240s resource)
  # Bumped to 180s: complex workflow prompts with tool schemas need more time on M1
  request_timeout: 180.0
  # Default agent persona when no explicit @agent prefix
  default_agent: "tia"

# COMPLEX: Reasoning specialist for analysis tasks
# - DeepSeek-R1-Distill-Qwen-14B: explicit chain-of-thought via <think> blocks
# - 9GB VRAM, fits on M1 16GB (tight but workable)
# - Good for: research, trade-off analysis, Socratic teaching, complex reasoning
# - Future M5 Ultra: upgrade to QwQ-32B (~20GB)
complex_model:
  name: "deepseek-r1:14b"
  context_limit: 32768
  max_tokens: 4096
  temperature: 0.0
  # Long timeout for reasoning chains (think blocks add latency)
  # Keep under iOS resource timeout (150-240s depending on environment)
  request_timeout: 120.0
  enabled: true
  default_agent: "mira"
  supports_tools: false  # deepseek-r1 does not support Ollama native tool calling

# CODING: Tool-calling + code specialist for execution tasks
# - Qwen 3 8B: native Ollama tool calling + strong coding (LiveCodeBench 60.2)
# - Replaces Qwen 2.5 Coder 7B — same RAM, adds structured output / function calling
# - Good for: tool calls, coding, task implementation, structured JSON output
# - Future M5 Ultra: upgrade to Qwen 2.5 Coder 32B (~20GB)
coding_model:
  name: "qwen3:8b"
  context_limit: 32768
  max_tokens: 4096
  temperature: 0.0
  request_timeout: 90.0
  enabled: true
  default_agent: "olly"

# -----------------------------------------------------------------------------
# Model Router Configuration
# -----------------------------------------------------------------------------

# Default model for inference (use primary for speed)
model_name: "qwen3.5:9b"

# Routing rules
routing:
  # Use coding/complex model for these patterns (when enabled)
  complex_patterns:
    - "analyze"
    - "explain in detail"
    - "step by step"
    - "write code"
    - "debug"
    - "code review"
    - "review.*code"
    - "refactor"
    - "implement"
    - "fix.*bug"
    - "test.*for"
    - "function.*that"
    - "class.*that"
    - "write.*script"
    - "code.*review"
    - "pull request"
  # Minimum token count to consider complex/coding routing
  complex_token_threshold: 500

# -----------------------------------------------------------------------------
# Generation Parameters (defaults)
# -----------------------------------------------------------------------------

temperature: 0.0          # Deterministic by default
max_tokens: 2048          # Max output tokens per request
top_p: 0.9                # Nucleus sampling

# -----------------------------------------------------------------------------
# Context Window Management (ADR-011)
# -----------------------------------------------------------------------------

context_limit: 32768
context_warning_threshold: 0.9  # Warn at 90% (28,672 tokens)

# Token budget allocation (within 32K limit)
system_prompt_budget: 2000      # System instructions
tool_definitions_budget: 1000   # Tool schemas
user_model_budget: 2000         # User preferences/context
# Remaining ~27K for: conversation history + memory retrieval

# -----------------------------------------------------------------------------
# Retry Settings
# -----------------------------------------------------------------------------

max_retries: 3
retry_base_delay: 1.0     # seconds
retry_max_delay: 30.0     # seconds

# -----------------------------------------------------------------------------
# Timeout Settings
# -----------------------------------------------------------------------------

# Default timeouts (overridden per-model above)
# Harmonized with iOS client timeouts to prevent race conditions:
#   - iOS request timeout: 120s (local) / 150s (tailscale)
#   - iOS resource timeout: 180s (local) / 240s (tailscale)
#   - Server timeout should complete BEFORE client timeout
request_timeout: 90.0     # seconds (fast model default, < iOS 120s)
connect_timeout: 30.0     # seconds (allow time for Ollama to start)

# -----------------------------------------------------------------------------
# Cloud LLM Configuration
# -----------------------------------------------------------------------------
# States:
#   disabled      - Local-only, no cloud calls (default)
#   enabled_full  - All queries routed through cloud (local as fallback)
#   enabled_smart - Local first, cloud spillover on failure or high token count
#
# Provider config (API keys, model selection) is managed via CloudManager
# and the /v1/cloud/* API endpoints. This section controls routing behavior.

cloud:
  state: "disabled"

  # Smart mode: route to cloud if input token count exceeds this threshold
  # (prevents local model from choking on long contexts)
  spillover_token_threshold: 16000

  # Smart mode: fall back to cloud after local retries are exhausted
  spillover_on_local_failure: true

  # Route tool-calling requests to cloud for better tool selection accuracy.
  # Local models (7-9B) struggle with multi-tool orchestration; cloud models
  # (Claude, GPT-4) are dramatically better. Set to false when upgrading to
  # hardware that can run larger local models (e.g., 70B+).
  tool_call_cloud_routing: true

  # Cloud request timeout (120s for long-form generation like wiki articles)
  request_timeout: 120.0

  # Cloud-specific retry count (separate from local retries)
  max_retries: 2

# -----------------------------------------------------------------------------
# Logging Configuration
# -----------------------------------------------------------------------------

logging:
  retention_days: 30        # Days to retain log files (metadata only, no content)

# -----------------------------------------------------------------------------
# Council Configuration (WS3)
# -----------------------------------------------------------------------------
# Multi-role LLM council for enhanced intent classification, tool extraction,
# response validation, and personality synthesis.
#
# Privacy: force_local_roles=true ensures council never sends data to cloud.
# When true, all roles use the local SLM regardless of cloud routing state.

council:
  enabled: true
  force_local_roles: true   # Council always uses local SLM, never cloud providers
  cloud_parallel: true
  local_slm_model: "qwen2.5:0.5b"
  local_slm_timeout: 15.0
  role_timeout: 30.0
  fallback_to_single_agent: true

  roles:
    coordinator:
      enabled: true
      temperature: 0.0
      max_tokens: 256
    analyzer:
      enabled: true
      temperature: 0.0
      max_tokens: 512
    validator:
      enabled: true
      temperature: 0.0
      max_tokens: 256
    responder:
      enabled: true
      temperature: 0.3
      max_tokens: 2048

# -----------------------------------------------------------------------------
# Hardware Adaptation (ADR-041)
# -----------------------------------------------------------------------------
# Detects when the primary model doesn't fit fully in GPU (Apple Silicon
# unified memory) and automatically falls back to a smaller model.
# Checked once after first successful inference via Ollama /api/ps.
#
# Override with env var: HESTIA_PRIMARY_MODEL=qwen2.5:7b

hardware_adaptation:
  enabled: true
  # Fallback model when primary is too slow on this hardware
  fallback_primary: "qwen2.5:7b"
  # Auto-enable cloud smart mode on constrained hardware
  auto_cloud_smart: true
  # Minimum acceptable generation speed (tokens/sec)
  # Below this, the primary model is too heavy for this hardware
  min_tokens_per_sec: 8.0
