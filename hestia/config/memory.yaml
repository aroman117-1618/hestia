# Memory Configuration
# Temporal decay settings for relevance scoring (ADR-013 extension)

temporal_decay:
  enabled: true

  # Per-chunk-type decay rates (lambda values for exponential decay)
  # Formula: decay_factor = e^(-lambda * age_days)
  # Higher lambda = faster decay. 0 = no decay.
  # Half-life = ln(2) / lambda ≈ 0.693 / lambda
  rates:
    conversation: 0.02    # Half-life ~35 days
    fact: 0.0             # No decay — facts persist indefinitely
    preference: 0.005     # Half-life ~139 days
    decision: 0.002       # Half-life ~347 days
    action_item: 0.01     # Half-life ~69 days
    research: 0.007       # Half-life ~99 days
    system: 0.0           # No decay for system memories

  # Floor — never decay below this relevance score
  min_score_after_decay: 0.1

  # Recency boost — memories within this window get a multiplier
  recency_boost_hours: 24
  recency_boost_factor: 1.2

# Importance scoring (Sprint 16)
# Composite score: weighted sum of recency, retrieval frequency, and chunk-type bonus
# Stored in ChunkMetadata.confidence field (repurposed from static 1.0)
importance:
  enabled: true
  weights:
    recency: 0.3
    retrieval: 0.4
    type_bonus: 0.3
  type_bonuses:
    fact: 0.8
    decision: 0.7
    preference: 0.6
    research: 0.5
    insight: 0.8
    action_item: 0.4
    conversation: 0.3
    system: 1.0
  recency_max_days: 90
  min_importance: 0.05
  system_floor: 0.5      # System/fact chunks never drop below this

# Consolidation — embedding-similarity dedup (Sprint 16)
consolidation:
  enabled: true
  similarity_threshold: 0.90
  sample_size: 50         # Max chunks to sample per run (audit condition: cap at 50)
  max_merges_per_run: 100
  require_same_type: true # Only merge chunks of the same chunk_type

# Pruning — age+importance-gated soft-delete (Sprint 16)
pruning:
  enabled: true
  max_age_days: 60
  importance_threshold: 0.2
  protected_statuses:
    - committed
  protected_types:
    - system

# Hallucination Guard (Sprint 18)
# Layer 1: domain patterns that indicate fabricated personal data
# Layer 2: retrieval quality threshold — warn LLM when context is weak
hallucination_guard:
  enabled: true

  # Layer 1: Tool Compliance Gate
  # Patterns that suggest a response claims personal data (calendar, health, notes, etc.)
  # Pair with fabricated-result indicators to reduce false positives.
  domain_claim_patterns:
    - "your next meeting"
    - "you have an? (event|appointment|meeting)"
    - "scheduled for"
    - "on your calendar"
    - "your heart rate"
    - "you took .* steps"
    - "your (weight|hrv|blood pressure|sleep)"
    - "in your (note|notes)"
    - "you wrote"
    - "your note (says|contains|mentions)"
    - "your reminder"
    - "you have a (task|reminder)"
    - "your email"
    - "you received"

  # Layer 2: Retrieval Quality Score Injection
  # When top cosine similarity is below this threshold, inject a low-relevance warning
  retrieval_quality_threshold: 0.6
  retrieval_warning: "[Memory context relevance: LOW ({score:.2f}). Retrieved context may not match this query precisely. Acknowledge uncertainty rather than speculating.]"
